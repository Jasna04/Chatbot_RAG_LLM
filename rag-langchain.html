<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background: #333;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      padding: 80px 20px;
      text-align: center;
      background: #f4f4f4;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
    }

    /* Chat UI */
    .chat-box {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      height: 300px;
      background: white;
      color: black;
      padding: 10px;
      overflow-y: auto;
      border-radius: 10px;
      display: none;
    }

    .chat-input {
      position: fixed;
      bottom: 20px;
      right: 20px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>My Website</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
</nav>

<div class="hero">
  <h1>Build Something Amazing 🚀</h1>
</div>

<div class="section">
  <h2>About Us</h2>
  <p>We build AI-powered solutions.</p>
</div>

<footer>
  <p>© 2026 My Website</p>
</footer>

<!-- Chatbox -->
<div id="chatBox" class="chat-box"></div>

<div class="chat-input">
  <input id="msg" placeholder="Ask something...">
  <button onclick="sendMsg()">Send</button>
  <button onclick="toggleChat()">Open Chat</button>
</div>

<script>
function toggleChat() {
  const box = document.getElementById("chatBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

async function sendMsg() {
  const msg = document.getElementById("msg").value;

  const res = await fetch("http://127.0.0.1:8000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: msg})
  });

  const data = await res.json();

  const chat = document.getElementById("chatBox");
  chat.innerHTML += "<p><b>You:</b> " + msg + "</p>";
  chat.innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
}
</script>

</body>
</html>
